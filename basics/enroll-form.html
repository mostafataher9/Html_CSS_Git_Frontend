<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body> <!--contains the actual data-->
    <header>
        <h1> Musical Concert Coming Soon </h1>
        <p> lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate! </p>
    </header>
    <main>
        <section>
            <h1> Welcome to the University </h1>
            <form action="basics/login-form" method="POST">
                <!-- This is a simple student enrollment form, name attribute is unique identifier for every input field -->
                <fieldset> <!-- This is a container for grouping related form elements and it is for design purposes -->
                    <legend>Student Information Registration</legend>
                    <!-- The type attribute specifies the kind of input field can be text , number, password, email....-->
                    <!-- the id attribuute of the input field is used to associate the label with the input field so for attribute has same value as id-->
                    <label for="name"> Name </label>
                    <input type="text" id="name" name="username" value="Mot" placeholder="Enter your name" required/>
                    <br />
                    <br />
                    <label for="password"> Password </label>
                    <input type="password" id="password" name="password" value="password123"
                        placeholder="Enter your password" required />

                    <br />
                    <br />
                    <label for="email"> Email </label>
                    <input type="email" id="email" name="email" value="mot@gmail.com" placeholder="Enter your email" required />

                    <br />
                    <br />
                    <label>Gender</label>
                    <input type="radio" id="gender_male" name="gender_male" value="male" required/>
                    <label for="gender_male"> Male</label>
                    <input type="radio" id="gender_female" name="gender_female" value="female" required />
                    <label for="gender_female"> Female </label>
                    <br />
                    <br />
                
                    <label for="phone_number"> Phone Number</label>
                    <input type="number" id="phone_number" name="phone_number" value="2000-01-01" placeholder="Enter your phone number" required />
                    <br />
                    <br />

                    <label for="date"> Date of Birth </label>
                    <input type="date" id="date" name="date" value="2000-01-01" placeholder="Enter your date of birth" required />


                </fieldset>

                <fieldset> <!-- This is a container for grouping related form elements and it is for design purposes -->
                    <legend>Education Details</legend>
                    <!-- The type attribute specifies the kind of input field can be text , number, password, email....-->
                    <!-- the id attribuute of the input field is used to associate the label with the input field so for attribute has same value as id-->
                    <label for="university_year"> University Year: </label>
                    <select name="university_year" id="university_year">
                        <option value="1">First Year</option>
                        <option value="2">Second Year</option>
                        <option value="3">Third Year</option>
                        <option value="4">Fourth Year</option>
                         <option value="4">Fourth Year</option>
                    </select>
                    <br />
                    <br />
                    <label> Select Courses of Interest </label>
                    <input type="checkbox" id="course1" name="courses" value="Lit" />
                    <label for="course1"> Course 1</label>
                    <input type="checkbox" id="course2" name="courses" value="Math" />
                    <label for="course2"> Course 2</label>
                    <input type="checkbox" id="course3" name="courses" checked disabled value="JS" /> <!-- Disabled checkbox means it cannot be selected checked means this input by default is selected-->
                    <label for="course3"> Course 3</label>

                    <br/> <br />
                    <label> Why interested in applying:</label>
                    <br/>
                    <textarea name="additional_info" cols="30" rows="10" placeholder="Enter any why interested in applying"></textarea>
               
                    <br /> <!-- their is  3 types of buttton submit, reset, button-->
                    <button type="submit">Submit</button>
                    <!-- once submit data go to the url in the action attribute in form element and method either get or post-->
                    <button type="reset">Reset</button>
                    <!-- return inputs to initial values if their is in input a value attrribute it eill be the initial value-->
                    </fieldset>
                 <p>
                    Already  have account? <a href="login-form.html">Login here</a>
                </p>
            </form>
        </section>
    </main>
    <hr />

</body>

</html>
