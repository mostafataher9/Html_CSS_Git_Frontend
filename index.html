<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> <!--contains the actual data-->
  <header>
     <h1> RSE Projects </h1>
     <p> Access projects through clicking in below list items </p>
     <ul> <!-- their is target elements in the a tag : target means where the link should open on the same tab or new tab: _self on the same tab, _blank on separated tab-->
       <li><a href="basics/groceries.html" target="_blank">Groceries</a></li> <!-- if the link is in the same domain, you can use relative path else you need to use absolute path -->
       <li><a href="basics/groceries.html#special_section" target="_blank">Groceries </a> - <i>Special Section</i></li>
       <li><a href="basics/gallery.html" target="_blank">Gallery</a></li>
       <li><a href="basics/enroll-form.html" target="_blank">Register</a></li>
       <li><a href="basics/login-form.html" target="_blank">Login</a></li>
     </ul>
  </header>
  <hr />
  <main>
        <section>
            <ul id="list-for-data">

            </ul>
        </section>
  </main>
  <!--script of js I can put at the end of the body or at the end of the head -->
  <script>
     const data=[
              {  id:1, name: "Alice"},
              {  id:2, name: "Bob"},
              {  id:3, name: "Charlie"}
     ];
    //loop through the data and create list items for each object in the data array and append them to the list element in the html
   document.addEventListener("DOMContentLoaded", function() { // this event is fired when the initial HTML document has been completely loaded and parsed, without waiting for stylesheets, images, and subframes to finish loading.
        const listElement = document.getElementById("list-for-data");
        data.forEach(item => {
            const listItem = document.createElement("li");
            listItem.textContent = `ID: ${item.id}, Name: ${item.name}`;
            listElement.appendChild(listItem);
        });
    });
  </script>

</body>

</html>
